    endpoint: /chat/completions
    iconUrl: https://image-clip.docker.19930810.xyz:8443/api/image?url=https%3A%2F%2Fcdn.deepseek.com%2Flogo.png%3Fx-image-process%3Dimage%252Fresize%252Cw_1920&cx=0&cy=0&cw=233&ch=165 # 建议使用官方图标路径
    models:
      - deepseek-chat  # DeepSeek-V3.2-Exp非思考模式，官方默认对话模型{insert\_element\_0\_}
      - deepseek-reasoner  # DeepSeek-V3.2-Exp思考模式，适合复杂推理{insert\_element\_1\_}
      - deepseek-coder  # 代码生成模型，支持代码补全、解释等{insert\_element\_2\_}
