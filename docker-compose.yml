services:
  gateway:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-dyyz1993}/llm-flux-gateway:latest
    container_name: llm-flux-gateway
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # 在这里添加你的 API 密钥或其他环境变量
      # - GEMINI_API_KEY=your_api_key_here
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    # 如果需要自动创建数据目录，可以添加以下命令
    # command: ["sh", "-c", "mkdir -p /app/data && npm start"]

volumes:
  data:
  config:
