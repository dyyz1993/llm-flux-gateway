services:
  gateway:
    # 使用本地构建而不是预构建镜像
    build:
      context: .
      dockerfile: Dockerfile
    image: llm-flux-gateway:local
    container_name: llm-flux-gateway
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - VITE_API_BASE_URL=
      # 在这里添加你的 API 密钥或其他环境变量
      # - GEMINI_API_KEY=your_api_key_here
      # ============================================
      # Admin Authentication (IMPORTANT: Change these!)
      # ============================================
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=your_secure_password_here
      - MAX_LOGIN_ATTEMPTS=5
      - LOGIN_BLOCK_MINUTES=5
      - SESSION_EXPIRE_DAYS=7
    volumes:
      - ./data:/app/data
      - ./config:/app/config

volumes:
  data:
  config:
